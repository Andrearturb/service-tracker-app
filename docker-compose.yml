services:
  db:
    image: postgres:16-alpine
    container_name: service-tracker-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: service-tracker-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: service-tracker-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    name: service-tracker-postgres-data